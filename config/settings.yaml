# ChronoScalp strategy/risk configuration.
# Safe to version-control — no secrets here (secrets live only in .env).

# Active symbols (panel can narrow via runtime_overrides; default = all below).
symbols:
  - "XAUUSD"
  - "EURUSD"
  - "EURJPY"
  - "USDJPY"
  - "BTCUSD"
  - "ETHUSD"
  # Add "XAUEUR" here too if your broker offers the direct cross instrument.

timeframes:
  higher_trend: ["M10", "M5"]   # must agree before any trade is permitted
  entry_trigger: ["M3", "M1"]   # entry timing / trigger confirmation
  # Ultra-scalp (sub-minute): S15 bars built from MT5 ticks; M5+M1 micro-trend
  ultra_scalp:
    higher_trend: ["M5", "M1"]
    entry_trigger: ["S15"]
    poll_interval_seconds: 2

indicators:
  ema_period_trend: 50
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  bollinger_period: 20
  bollinger_std_dev: 2.0
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  atr_period: 14
  rvol_period: 20                    # relative volume lookback (tick_volume ÷ avg)

strategy:
  require_trend_alignment: true      # M10 and M5 must agree (or M5/M1 in ultra-scalp)
  # Multi-select modes (panel + overrides). When several are on, any one may confirm (OR).
  enabled_strategies:
    - smc_confluence
    - liquidity_volume
    - ultra_scalp
  use_smc_confluence: true           # kept in sync with enabled_strategies
  use_liquidity_volume: true         # volume-confirmed liquidity sweep (RVOL gate)
  use_ultra_scalp: true              # high-frequency S15 impulse scalp
  liquidity_rvol_min: 1.5
  min_signal_confidence: 0.55
  ultra_scalp:
    atr_stop_multiple: 1.0           # still enforces min 1:1.5 with target below
    atr_target_multiple: 1.5
    rvol_min: 1.2

sessions:
  timezone: "GMT"
  windows:
    london: { start: "08:00", end: "11:00" }
    new_york: { start: "13:30", end: "16:30" }
  trade_outside_sessions: false
  # Crypto trades 24/7 — skip London/NY gate for these symbols only
  always_on_symbols:
    - "BTCUSD"
    - "ETHUSD"

news_filter:
  enabled: true
  blackout_minutes_before: 30
  blackout_minutes_after: 30
  high_impact_only: true

risk:
  # Hard constraints — see CLAUDE.md / .cursor/rules/project.mdc.
  # Do not raise these without deliberately re-reading docs/ARCHITECTURE.md
  # "Win-rate expectations" section first.
  max_risk_per_trade_pct: 1.0       # absolute ceiling (never exceeded in code)
  # User-selectable presets in the control panel (default 1.0).
  # Selecting 1.5 is allowed in the UI but is hard-capped to max_risk_per_trade_pct.
  risk_presets_pct: [0.5, 1.0, 1.5]
  active_risk_per_trade_pct: 1.0
  min_reward_risk_ratio: 1.5
  max_daily_loss_pct: 3.0
  max_concurrent_positions: 3
  use_kelly_sizing: false          # if true, Kelly fraction is still hard-capped at max_risk_per_trade_pct
  breakeven_at_r_multiple: 1.0
  trailing_stop_atr_multiple: 1.5

spread_filter:
  enabled: true
  sample_live_spread: true        # append spread observations to data/spread_history/
  spread_history_dir: "data/spread_history"
  max_spread_pips:
    XAUUSD: 35
    EURUSD: 2.0
    EURJPY: 3.0
    USDJPY: 2.0
    BTCUSD: 50
    ETHUSD: 50

ml:
  enabled: false                  # set true after training + OOS validation
  model_path: "data/models/setup_classifier.joblib"

execution:
  broker: "paper"    # "paper" | "mt5" | "oanda"
  data_source: "auto"             # "auto" | "mt5" | "oanda" — auto picks oanda when broker=oanda
  slippage_pips: 0.5
  poll_interval_seconds: 5
  trade_on_bar_close_only: true   # evaluate entries once per completed trigger bar
  state_dir: "data/state"         # persistent open tickets + dedup keys
  magic_number: 20260711          # MT5 magic — must match live positions

oanda:
  environment: "practice"         # "practice" | "live" — use practice until validated
  timeout_seconds: 15

alerting:
  enabled: false                  # set true once TELEGRAM_* or DISCORD_* are in .env
  telegram_enabled: true
  discord_enabled: true
  timeout_seconds: 5
  prefix: "ChronoScalp"

resilience:
  max_consecutive_errors: 5       # circuit breaker trips after this many loop failures
  reconcile_interval_seconds: 60  # periodic broker ↔ state sync (0 = startup only)
  alert_on_daily_loss_limit: true
  alert_on_connection_loss: true

licensing:
  require_license: true           # set false only for local open-source / self use without keys
  # Seller sets LICENSE_ADMIN_SECRET in .env, then issues keys via scripts/app.py (Admin) or manage_licenses.py

saas:
  ib_referral_url: ""             # your OANDA/partner Introducing Broker signup link
  product_name: "ChronoScalp"

backtest:
  initial_balance: 10000
  commission_per_lot: 7.0
  data_dir: "data/history"
