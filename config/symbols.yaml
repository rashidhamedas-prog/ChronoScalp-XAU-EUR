# Per-symbol contract specifications used by risk sizing, backtesting, and
# the paper broker's fill simulation. Adjust to match your actual broker's
# contract specs (check your broker's symbol specification sheet).

XAUUSD:
  pip_size: 0.01          # 1 pip = $0.01 move for most gold quote conventions
  contract_size: 100      # 1 standard lot = 100 oz
  min_lot: 0.01
  lot_step: 0.01
  max_lot: 50
  typical_spread_pips: 20
  pip_value_per_lot: 1.0  # USD value of 1 pip move for 1.0 lot (broker-dependent, verify)
  news_currency: USD      # for news blackout filter (XAUUSD → USD events)

EURUSD:
  pip_size: 0.0001
  contract_size: 100000   # 1 standard lot = 100,000 units
  min_lot: 0.01
  lot_step: 0.01
  max_lot: 100
  typical_spread_pips: 1.0
  pip_value_per_lot: 10.0
  news_currency: EUR

EURJPY:
  pip_size: 0.01          # 1 pip = 0.01 JPY on most MT5 brokers
  contract_size: 100000
  min_lot: 0.01
  lot_step: 0.01
  max_lot: 100
  typical_spread_pips: 2.0
  # ~¥1000 per pip per lot ≈ $6.5–7 at ~150 USDJPY — verify on your broker
  pip_value_per_lot: 6.5
  news_currency: EUR      # primary; JPY high-impact also matters — extend filter later if needed

XAUEUR:
  pip_size: 0.01
  contract_size: 100
  min_lot: 0.01
  lot_step: 0.01
  max_lot: 50
  typical_spread_pips: 30
  pip_value_per_lot: 1.0

# Crypto CFD — verify pip/contract against your MT5 broker symbol card.
# Default assumes 1 lot ≈ 1 BTC and $1 price move ≈ $1 PnL per lot.
BTCUSD:
  pip_size: 1.0
  contract_size: 1
  min_lot: 0.01
  lot_step: 0.01
  max_lot: 10
  typical_spread_pips: 20
  pip_value_per_lot: 1.0
  news_currency: USD
