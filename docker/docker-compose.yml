services:
  chronoscalp-backtest:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../config:/app/config
    command: ["python", "scripts/run_backtest.py", "--symbol", "XAUUSD"]
    restart: "no"

  # Once a Linux-native broker (e.g. OANDA REST, see docs/ROADMAP.md) is
  # implemented, add a `chronoscalp-live` service here with
  # `restart: unless-stopped` for unattended operation.
